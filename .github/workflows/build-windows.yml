name: Build Windows exe

on:
  push:
    branches: [main]
    tags: ["v*"]        # push tag v* -> build + tạo GitHub Release kèm .exe
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # cần quyền ghi để tạo Release (bước cuối)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==6.10.0

      - name: Build exe
        run: python -m PyInstaller build.spec --noconfirm

      - name: Stage runtime files next to exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/config, dist/output | Out-Null
          Copy-Item config/accounts.example.yaml dist/config/accounts.yaml
          Copy-Item config/name_aliases.yaml dist/config/name_aliases.yaml
          Copy-Item output/catalog_master_entity_resolved.xlsx dist/output/catalog_master_entity_resolved.xlsx
          $required = @(
            "dist/PharmaPrice.exe",
            "dist/config/accounts.yaml",
            "dist/config/name_aliases.yaml",
            "dist/output/catalog_master_entity_resolved.xlsx"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Missing release file: $path"
            }
          }

      - uses: actions/upload-artifact@v7
        with:
          name: PharmaPrice-windows
          path: dist/
          if-no-files-found: error
          compression-level: 0

      # --- Chỉ khi push tag v* : đóng gói + tạo GitHub Release (link cố định) ---
      - name: Zip release bundle
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath PharmaPrice-windows.zip -Force

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create ${{ github.ref_name }}
          PharmaPrice-windows.zip
          --repo ${{ github.repository }}
          --title "PharmaPrice ${{ github.ref_name }}"
          --generate-notes
