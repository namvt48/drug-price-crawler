name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==6.10.0

      - name: Build exe
        run: python -m PyInstaller build.spec --noconfirm

      - name: Stage runtime files next to exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/config, dist/output | Out-Null
          Copy-Item config/accounts.example.yaml dist/config/accounts.yaml
          Copy-Item config/name_aliases.yaml dist/config/name_aliases.yaml
          Copy-Item output/catalog_master_entity_resolved.xlsx dist/output/catalog_master_entity_resolved.xlsx
          $required = @(
            "dist/DrugPriceCrawler.exe",
            "dist/config/accounts.yaml",
            "dist/config/name_aliases.yaml",
            "dist/output/catalog_master_entity_resolved.xlsx"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Missing release file: $path"
            }
          }

      - uses: actions/upload-artifact@v7
        with:
          name: DrugPriceCrawler-windows
          path: dist/
          if-no-files-found: error
          compression-level: 0
