# =============================================================================
# Drug Price Crawler — Account & Site Configuration (EXAMPLE)
# =============================================================================
# Copy file này thành `config/accounts.yaml` rồi điền credentials thật.
# `config/accounts.yaml` đã nằm trong .gitignore — KHÔNG commit mật khẩu.
#
# File này liệt kê ĐẦY ĐỦ cả 9 site với username/password để TRỐNG, để trong
# app (nút "⚙ Sửa tài khoản") bạn thấy hết 9 ô và biết điền vào đâu.
# URL / auth / cache / rate_limit đã cấu hình sẵn — chỉ cần điền tài khoản.
# =============================================================================

# Cài đặt chung cho tất cả nguồn
defaults:
  cache:
    enabled: true
    ttl_hours: 168             # Cache kết quả 1 tuần (168h)
  auth:
    expiry_hours: 12           # Mặc định session hết hạn sau 12h
    retry_on_401: true         # Tự động đăng nhập lại nếu gặp 401
    max_auth_retries: 3        # Số lần thử lại đăng nhập tối đa
  rate_limit:
    delay_seconds: 2           # Delay 2s giữa requests
    max_retries: 3             # Retry 3 lần nếu network error
    retry_backoff_seconds: 5   # Backoff base: 5s → 10s → 20s
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"

# =============================================================================
# DANH SÁCH WEBSITE (9 nguồn B2B cần auth) — điền username/password của bạn
# =============================================================================

sites:
  # ---------------------------------------------------------------------------
  # 1. Giathuoctot.com
  # ---------------------------------------------------------------------------
  giathuoctot:
    enabled: true
    name: "Giá Thuốc Tốt"
    base_url: "https://www.giathuoctot.com"
    login_url: "https://www.giathuoctot.com/login"
    search_url: "https://www.giathuoctot.com/quick-order?page=1&searchTerm={keyword}"
    credentials:
      username: ""
      password: ""
    auth:
      method: form_login
      session_key: "session_id"
      expiry_hours: 12
    cache:
      enabled: true
      ttl_hours: 168
    rate_limit:
      delay_seconds: 2

