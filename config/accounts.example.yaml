# --- Whitelist filter (tùy chọn) — chỉ giữ bản ghi khớp; danh sách rỗng = không lọc.
# So khớp không phân biệt hoa thường / có dấu. CLI --manufacturer/--contains ghi đè.
filters:
  name_keywords: []        # vd: ["boganic", "paracetamol"]
  manufacturers: []        # vd: ["Traphaco", "Sanofi"]
  min_price_vnd: 0         # 0 = không giới hạn
  max_price_vnd: 0         # 0 = không giới hạn

# --- Watchlist (theo dõi giá định kỳ) — refresh giá mỗi N phút. Catalog (tên+SKU,
# KHÔNG có giá, dùng để search gợi ý) nạp tĩnh từ
# output/catalog_master.xlsx, không còn TTL/crawl lại.
watchlist:
  refresh_interval_minutes: 10   # chu kỳ refresh giá watchlist
